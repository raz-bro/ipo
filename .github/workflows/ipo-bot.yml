name: IPO Bot Poll Cycle

on:
  schedule:
    # GitHub may delay scheduled runs under load; this is a target, not a
    # guarantee. Cron is UTC regardless of TIMEZONE in .env/secrets.
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # allows manually triggering a run from the Actions tab

permissions:
  contents: write # needed to commit the updated database file back

concurrency:
  group: ipo-bot-poll
  cancel-in-progress: false # never cancel a run mid-cycle; queue instead

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one poll cycle
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python run_once.py

      - name: Persist database changes
        run: |
          git config user.name "ipo-bot"
          git config user.email "actions@users.noreply.github.com"
          git add database/*.db
          git diff --cached --quiet || git commit -m "chore: update IPO bot database [skip actions]"
          git push
